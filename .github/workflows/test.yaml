name: Lint and test

env:
  MIN_HA: "2026.1.0"
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.9"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install Python dependencies
        run: |
          uv sync --all-extras
          uv pip install pre-commit

      - name: Pre-commit
        run: |
          uv run pre-commit run --hook-stage manual --all-files

      - name: Test
        run: |
          uv run pytest \
            --cov-report term \
            --cov-report xml:coverage.xml \
            --cov=myskoda

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          fail-on-error: false

  get-ha-versions:
    runs-on: ubuntu-latest
    outputs:
      ha-versions: ${{ steps.fetch.outputs.versions }}
    steps:
      - name: Fetch HA versions from PyPI
        id: fetch
        run: |
          VERSIONS=$(curl -s https://pypi.org/pypi/homeassistant/json | \
            jq -c --arg min "$MIN_HA" \
              '[.releases | keys[] | select(. >= $min) | select(test("a|b|rc|dev") | not)] |
               map({minor: (split(".") | .[0:2] | join(".")), patch: (split(".") | .[2] | tonumber), full: .}) |
               group_by(.minor) |
               map(max_by(.patch) | .full)')
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "versions: $VERSIONS"

  ha-compat:
    needs: get-ha-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ha-version: ${{ fromJson(needs.get-ha-versions.outputs.ha-versions) }}
    name: HA ${{ matrix.ha-version }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Check dependency resolution with HA ${{ matrix.ha-version }}
        env:
          # litellm (via hass-nabucasa) vendors PyO3 0.23.5, which refuses to
          # build on Python 3.14+ unless the stable ABI forward-compat check is
          # bypassed. Safe for a resolution-only check job.
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          uv venv && \
          uv pip install \
            "homeassistant==${{ matrix.ha-version }}" \
            "."
